- name: Ensure AdGuard Home directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ adguard_dir }}"
    - "{{ adguard_conf_dir }}"
    - "{{ adguard_work_dir }}"
  when:
    - enable_adguard | bool
    - not ansible_check_mode

- name: Write AdGuard Home compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ adguard_dir }}/docker-compose.yml"
    mode: "0644"
  when:
    - enable_adguard | bool
    - not ansible_check_mode

- name: Render AdGuard Home config from template
  ansible.builtin.template:
    src: AdGuardHome.yaml.j2
    dest: "{{ adguard_config_file }}"
    mode: "0600"
  register: adguard_home_config_template
  when:
    - enable_adguard | bool
    - adguard_manage_config | bool
    - not ansible_check_mode

- name: Check existing AdGuard Home config
  ansible.builtin.stat:
    path: "{{ adguard_config_file }}"
  register: adguard_home_config_stat
  when:
    - enable_adguard | bool
    - not (adguard_manage_config | bool)
    - not ansible_check_mode

- name: Force AdGuard Home internal web port to configured value
  ansible.builtin.lineinfile:
    path: "{{ adguard_config_file }}"
    regexp: '^  address: .*$'
    line: "  address: 0.0.0.0:{{ adguard_internal_web_port }}"
    backrefs: false
  register: adguard_home_http_address
  when:
    - enable_adguard | bool
    - not (adguard_manage_config | bool)
    - adguard_home_config_stat.stat.exists
    - not ansible_check_mode

- name: Allow AdGuard Home DNS (TCP)
  ansible.builtin.ufw:
    rule: allow
    port: "{{ adguard_dns_port }}"
    proto: tcp
  when:
    - enable_adguard | bool
    - adguard_dns_publish_host not in ['127.0.0.1', '::1', 'localhost']
    - not ansible_check_mode

- name: Allow AdGuard Home DNS (UDP)
  ansible.builtin.ufw:
    rule: allow
    port: "{{ adguard_dns_port }}"
    proto: udp
  when:
    - enable_adguard | bool
    - adguard_dns_publish_host not in ['127.0.0.1', '::1', 'localhost']
    - not ansible_check_mode

- name: Remove AdGuard Home DNS (TCP) from UFW when plain DNS is local-only
  ansible.builtin.ufw:
    rule: allow
    port: "{{ adguard_dns_port }}"
    proto: tcp
    delete: true
  when:
    - enable_adguard | bool
    - adguard_dns_publish_host in ['127.0.0.1', '::1', 'localhost']
    - not ansible_check_mode

- name: Remove AdGuard Home DNS (UDP) from UFW when plain DNS is local-only
  ansible.builtin.ufw:
    rule: allow
    port: "{{ adguard_dns_port }}"
    proto: udp
    delete: true
  when:
    - enable_adguard | bool
    - adguard_dns_publish_host in ['127.0.0.1', '::1', 'localhost']
    - not ansible_check_mode

- name: Allow AdGuard Home DNS-over-TLS
  ansible.builtin.ufw:
    rule: allow
    port: "{{ adguard_tls_port_dns_over_tls }}"
    proto: tcp
  when:
    - enable_adguard | bool
    - adguard_manage_config | bool
    - adguard_tls_enabled | bool
    - adguard_tls_port_dns_over_tls | int > 0
    - not ansible_check_mode

- name: Allow AdGuard Home web UI
  ansible.builtin.ufw:
    rule: allow
    port: "{{ adguard_web_port }}"
    proto: tcp
  when:
    - enable_adguard | bool
    - not ansible_check_mode

- name: Allow AdGuard Home HTTPS UI
  ansible.builtin.ufw:
    rule: allow
    port: "{{ adguard_tls_port_https }}"
    proto: tcp
  when:
    - enable_adguard | bool
    - adguard_manage_config | bool
    - adguard_tls_enabled | bool
    - adguard_tls_port_https | int > 0
    - not ansible_check_mode

- name: Validate AdGuard and Grafana host ports do not conflict
  ansible.builtin.assert:
    that:
      - not (
          enable_monitoring | default(false) | bool and
          (monitoring_grafana_port | default(-1) | int == adguard_web_port | int)
        )
    fail_msg: >-
      adguard_web_port ({{ adguard_web_port }}) conflicts with
      monitoring_grafana_port ({{ monitoring_grafana_port | default('undefined') }}).
      Set one of these host ports to a different value.
  when:
    - enable_adguard | bool

- name: Validate AdGuard HTTPS UI and Grafana host ports do not conflict
  ansible.builtin.assert:
    that:
      - not (
          enable_monitoring | default(false) | bool and
          adguard_manage_config | bool and
          adguard_tls_enabled | bool and
          adguard_tls_port_https | int > 0 and
          (monitoring_grafana_port | default(-1) | int == adguard_tls_port_https | int)
        )
    fail_msg: >-
      adguard_tls_port_https ({{ adguard_tls_port_https }}) conflicts with
      monitoring_grafana_port ({{ monitoring_grafana_port | default('undefined') }}).
      Set one of these host ports to a different value.
  when:
    - enable_adguard | bool

- name: Gather service facts for DNS listener conflict checks
  ansible.builtin.service_facts:
  when:
    - enable_adguard | bool
    - adguard_manage_systemd_resolved | bool
    - adguard_dns_port | int == 53
    - not ansible_check_mode

- name: Disable systemd-resolved DNS stub listener when AdGuard binds :53
  ansible.builtin.ini_file:
    path: /etc/systemd/resolved.conf
    section: Resolve
    option: DNSStubListener
    value: "no"
    no_extra_spaces: true
  register: adguard_resolved_stub
  when:
    - enable_adguard | bool
    - adguard_manage_systemd_resolved | bool
    - adguard_dns_port | int == 53
    - "'systemd-resolved.service' in (ansible_facts.services | default({}))"
    - not ansible_check_mode

- name: Restart systemd-resolved when DNS stub listener config changed
  ansible.builtin.service:
    name: systemd-resolved
    state: restarted
  when:
    - enable_adguard | bool
    - adguard_manage_systemd_resolved | bool
    - adguard_dns_port | int == 53
    - "'systemd-resolved.service' in (ansible_facts.services | default({}))"
    - adguard_resolved_stub is changed
    - not ansible_check_mode

- name: Ensure /etc/resolv.conf points to non-stub systemd-resolved config
  ansible.builtin.file:
    src: /run/systemd/resolve/resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: true
  when:
    - enable_adguard | bool
    - adguard_manage_systemd_resolved | bool
    - adguard_dns_port | int == 53
    - "'systemd-resolved.service' in (ansible_facts.services | default({}))"
    - not ansible_check_mode

- name: Run AdGuard Home via docker compose
  ansible.builtin.command: >
    docker compose -f {{ adguard_dir }}/docker-compose.yml
    up -d
  args:
    chdir: "{{ adguard_dir }}"
  when:
    - enable_adguard | bool
    - not ansible_check_mode

- name: Restart AdGuard Home container when web port config changed
  ansible.builtin.command: docker restart {{ adguard_container_name }}
  when:
    - enable_adguard | bool
    - (
        (adguard_manage_config | bool) and
        (adguard_home_config_template is defined) and
        (adguard_home_config_template is changed)
      ) or (
        not (adguard_manage_config | bool) and
        (adguard_home_http_address is defined) and
        (adguard_home_http_address is changed)
      )
    - not ansible_check_mode
