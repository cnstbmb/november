- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Allow SSH
  ansible.builtin.ufw:
    rule: allow
    port: "{{ ansible_port }}"
    proto: tcp

- name: Allow nativeProxy TCP ingress
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_tcp_ports | default([443]) }}"

- name: Allow optional UDP ingress
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ firewall_udp_ports | default([]) }}"

- name: Set default incoming policy
  ansible.builtin.ufw:
    policy: deny
    direction: incoming

- name: Set default outgoing policy
  ansible.builtin.ufw:
    policy: allow
    direction: outgoing

- name: Enable UFW
  ansible.builtin.ufw:
    state: enabled
