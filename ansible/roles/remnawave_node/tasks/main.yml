- name: Resolve remnawave node compose paths
  ansible.builtin.set_fact:
    remnawave_node_compose_src: >-
      {{
        node_compose_src
        if (
          node_compose_src is defined and
          node_compose_src | regex_search('^/')
        )
        else (
          (repo_root ~ '/' ~ node_compose_src)
          if (
            node_compose_src is defined and
            node_compose_src | length > 0
          )
          else (repo_root ~ '/deployments/prod/remnawave-node/docker-compose.yml')
        )
      }}
    remnawave_node_compose_dest_dir: "{{ node_compose_dest_dir | default('/opt/remnawave-node') }}"
    remnawave_node_compose_dest_file: "{{ node_compose_dest_file | default('/opt/remnawave-node/docker-compose.yml') }}"
    remnawave_node_env_src: >-
      {{
        node_env_src
        if (
          node_env_src is defined and
          node_env_src | regex_search('^/')
        )
        else (
          (repo_root ~ '/' ~ node_env_src)
          if (
            node_env_src is defined and
            node_env_src | length > 0
          )
          else ''
        )
      }}
    remnawave_node_env_dest: "{{ node_env_dest | default('/opt/remnawave-node/.env') }}"

- name: Validate remnawave node env source is configured
  ansible.builtin.assert:
    that:
      - remnawave_node_env_src is defined
      - remnawave_node_env_src | length > 0
    fail_msg: >-
      node_env_src is empty for {{ inventory_hostname }}.
      Run tools/ansible/bootstrap_remnawave_node_env.sh and provide node secrets from Remnawave panel.

- name: Ensure remnawave node compose file exists on control-node
  ansible.builtin.stat:
    path: "{{ remnawave_node_compose_src }}"
  delegate_to: localhost
  become: false
  register: remnawave_node_compose_src_stat

- name: Validate remnawave node compose file exists on control-node
  ansible.builtin.assert:
    that:
      - remnawave_node_compose_src_stat.stat.exists
      - remnawave_node_compose_src_stat.stat.isreg
    fail_msg: "Remnawave node compose file not found: {{ remnawave_node_compose_src }}"

- name: Ensure remnawave node env file exists on control-node
  ansible.builtin.stat:
    path: "{{ remnawave_node_env_src }}"
  delegate_to: localhost
  become: false
  register: remnawave_node_env_src_stat

- name: Validate remnawave node env file exists on control-node
  ansible.builtin.assert:
    that:
      - remnawave_node_env_src_stat.stat.exists
      - remnawave_node_env_src_stat.stat.isreg
    fail_msg: "Remnawave node env file not found: {{ remnawave_node_env_src }}"

- name: Read remnawave node env file on control-node
  ansible.builtin.slurp:
    src: "{{ remnawave_node_env_src }}"
  delegate_to: localhost
  become: false
  register: remnawave_node_env_src_content

- name: Resolve remnawave node listen port from env
  ansible.builtin.set_fact:
    remnawave_node_listen_port: >-
      {{
        (
          (remnawave_node_env_src_content.content | b64decode)
          | regex_findall('(?m)^(?:NODE_PORT|APP_PORT)=([0-9]+)$')
          | first
        ) | default(node_firewall_port | default('2222'), true)
      }}

- name: Allow remnawave node listen port in UFW
  ansible.builtin.ufw:
    rule: allow
    port: "{{ remnawave_node_listen_port }}"
    proto: tcp
  when: remnawave_node_open_firewall | default(true) | bool

- name: Find legacy remnawave node containers
  ansible.builtin.shell: >
    docker ps -a --format '{% raw %}{{.ID}} {{.Names}} {{.Image}}{% endraw %}'
    | awk '$3 ~ /^remnawave\/node/ && $2 != "remnawave-node" { print $1 }'
  register: remnawave_node_legacy_containers
  changed_when: false
  when: not ansible_check_mode

- name: Remove legacy remnawave node containers
  ansible.builtin.command: "docker rm -f {{ item }}"
  loop: "{{ remnawave_node_legacy_containers.stdout_lines }}"
  when:
    - not ansible_check_mode
    - remnawave_node_legacy_containers.stdout_lines | length > 0

- name: Deploy remnawave node compose stack
  ansible.builtin.import_role:
    name: docker_compose
  vars:
    compose_src: "{{ remnawave_node_compose_src }}"
    compose_dest_dir: "{{ remnawave_node_compose_dest_dir }}"
    compose_dest_file: "{{ remnawave_node_compose_dest_file }}"
    env_src: "{{ remnawave_node_env_src }}"
    env_dest: "{{ remnawave_node_env_dest }}"
