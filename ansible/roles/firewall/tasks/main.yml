- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set default UFW policies
  ansible.builtin.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow outgoing by default
  ansible.builtin.ufw:
    state: enabled
    policy: allow
    direction: outgoing

- name: Deny configured ingress TCP ports before allow rules
  ansible.builtin.ufw:
    insert: 1
    rule: deny
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_deny_tcp_ports | default([]) }}"
  when:
    - firewall_deny_tcp_ports is defined
    - firewall_deny_tcp_ports | length > 0

- name: Drop non-loopback ingress TCP ports before UFW chains
  ansible.builtin.shell: >
    iptables -C INPUT ! -i lo -p tcp --dport {{ item }} -j DROP
    || iptables -I INPUT 1 ! -i lo -p tcp --dport {{ item }} -j DROP
  loop: "{{ firewall_drop_non_loopback_tcp_ports | default([]) }}"
  changed_when: "'Bad rule' in firewall_drop_non_loopback_result.stderr"
  register: firewall_drop_non_loopback_result
  when:
    - firewall_drop_non_loopback_tcp_ports is defined
    - firewall_drop_non_loopback_tcp_ports | length > 0

- name: Drop non-loopback ingress TCP ports before UFW IPv6 chains
  ansible.builtin.shell: >
    ip6tables -C INPUT ! -i lo -p tcp --dport {{ item }} -j DROP
    || ip6tables -I INPUT 1 ! -i lo -p tcp --dport {{ item }} -j DROP
  loop: "{{ firewall_drop_non_loopback_tcp_ports | default([]) }}"
  changed_when: "'Bad rule' in firewall_drop_non_loopback_ipv6_result.stderr"
  register: firewall_drop_non_loopback_ipv6_result
  when:
    - firewall_drop_non_loopback_tcp_ports is defined
    - firewall_drop_non_loopback_tcp_ports | length > 0

- name: Allow configured CIDR ingress TCP ports before drop rules
  ansible.builtin.shell: >
    iptables -C INPUT -s {{ item.cidr }} -p tcp --dport {{ item.port }} -j ACCEPT
    || iptables -I INPUT 1 -s {{ item.cidr }} -p tcp --dport {{ item.port }} -j ACCEPT
  loop: "{{ firewall_allow_cidr_tcp_ports | default([]) }}"
  changed_when: "'Bad rule' in firewall_allow_cidr_tcp_result.stderr"
  register: firewall_allow_cidr_tcp_result
  when:
    - firewall_allow_cidr_tcp_ports is defined
    - firewall_allow_cidr_tcp_ports | length > 0

- name: Allow SSH
  ansible.builtin.ufw:
    rule: allow
    port: "{{ ansible_port }}"
    proto: tcp

- name: Allow configured ingress TCP ports
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: >-
    {{
      (
        firewall_master_tcp_ports | default([80, 443, 9443, 10443])
      )
      +
      (
        [monitoring_grafana_port]
        if (enable_monitoring | default(false) | bool)
        else []
      )
      | map('int')
      | unique
      | list
    }}
  when: allow_http_https | bool

- name: Allow extra ingress TCP ports
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_extra_tcp_ports | default([]) }}"
  when:
    - firewall_extra_tcp_ports is defined
    - firewall_extra_tcp_ports | length > 0

- name: Allow extra ingress UDP ports
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ firewall_extra_udp_ports | default([]) }}"
  when:
    - firewall_extra_udp_ports is defined
    - firewall_extra_udp_ports | length > 0

- name: Allow Prometheus scrapes from master to worker node exporters
  ansible.builtin.ufw:
    rule: allow
    port: "{{ monitoring_node_exporter_port | default(9100) | string }}"
    proto: tcp
    from_ip: "{{ hostvars[item].ansible_host | default(item) }}"
  loop: "{{ groups['master'] | default([]) }}"
  when:
    - enable_monitoring | default(false) | bool
    - inventory_hostname not in (groups['master'] | default([]))

- name: Allow Promtail on workers to push logs into master Loki
  ansible.builtin.ufw:
    rule: allow
    port: "{{ monitoring_loki_port | default(3100) | string }}"
    proto: tcp
    from_ip: "{{ hostvars[item].ansible_host | default(item) }}"
  loop: "{{ groups['workers'] | default([]) }}"
  when:
    - enable_monitoring | default(false) | bool
    - inventory_hostname in (groups['master'] | default([]))
