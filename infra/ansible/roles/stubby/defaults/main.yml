stubby_manage_config: true
stubby_config_path: "/etc/stubby/stubby.yml"

stubby_resolution_type: "GETDNS_RESOLUTION_STUB"
stubby_dns_transport_list:
  - "GETDNS_TRANSPORT_TLS"
stubby_tls_authentication: "GETDNS_AUTHENTICATION_REQUIRED"
stubby_tls_query_padding_blocksize: 128
stubby_edns_client_subnet_private: 1
stubby_round_robin_upstreams: 1
stubby_idle_timeout: 10000
stubby_listen_addresses:
  - "127.0.0.1@53"
  - "0.0.0.0@5353"

stubby_upstream_address: ""
stubby_tls_auth_name: ""
stubby_tls_port: 953
stubby_upstream_recursive_servers: []
