- name: Ensure monitoring directory exists
  ansible.builtin.file:
    path: "{{ monitoring_dir }}"
    state: directory
    mode: "0755"
  when: not ansible_check_mode

- name: Ensure Grafana provisioning directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ monitoring_dir }}/grafana"
    - "{{ monitoring_dir }}/grafana/provisioning"
    - "{{ monitoring_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_dir }}/grafana/dashboards"
  when: not ansible_check_mode

- name: Render monitoring configs
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ monitoring_dir }}/{{ item | basename | regex_replace('\\.j2$', '') }}"
    mode: "0644"
  loop:
    - prometheus.yml.j2
    - loki-config.yml.j2
    - blackbox.yml.j2
  register: monitoring_config_templates
  when: not ansible_check_mode

- name: Render Grafana provisioning files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - src: grafana-datasources.yml.j2
      dest: "{{ monitoring_dir }}/grafana/provisioning/datasources/datasources.yml"
    - src: grafana-dashboardproviders.yml.j2
      dest: "{{ monitoring_dir }}/grafana/provisioning/dashboards/dashboards.yml"
    - src: dashboard-infrastructure-overview.json.j2
      dest: "{{ monitoring_dir }}/grafana/dashboards/infrastructure-overview.json"
    - src: dashboard-host-detail.json.j2
      dest: "{{ monitoring_dir }}/grafana/dashboards/host-detail.json"
    - src: dashboard-logs-overview.json.j2
      dest: "{{ monitoring_dir }}/grafana/dashboards/logs-overview.json"
    - src: dashboard-service-health.json.j2
      dest: "{{ monitoring_dir }}/grafana/dashboards/service-health.json"
  register: monitoring_grafana_templates
  when: not ansible_check_mode

- name: Render monitoring compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_dir }}/docker-compose.yml"
    mode: "0644"
  register: monitoring_compose_template
  when: not ansible_check_mode

- name: Recreate monitoring stack when config changed
  ansible.builtin.command: docker compose up -d --remove-orphans --force-recreate
  args:
    chdir: "{{ monitoring_dir }}"
  when:
    - not ansible_check_mode
    - >
      (monitoring_config_templates is defined and (monitoring_config_templates.results | selectattr('changed') | list | length > 0))
      or
      (monitoring_grafana_templates is defined and (monitoring_grafana_templates.results | selectattr('changed') | list | length > 0))
      or
      (monitoring_compose_template is defined and monitoring_compose_template.changed)

- name: Start monitoring stack
  ansible.builtin.command: docker compose up -d --remove-orphans
  args:
    chdir: "{{ monitoring_dir }}"
  when: not ansible_check_mode
