- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set default UFW policies
  ansible.builtin.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow outgoing by default
  ansible.builtin.ufw:
    state: enabled
    policy: allow
    direction: outgoing

- name: Allow SSH
  ansible.builtin.ufw:
    rule: allow
    port: "{{ ansible_port }}"
    proto: tcp

- name: Allow configured ingress TCP ports
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_master_tcp_ports | default([80, 443, 9443, 10443]) }}"
  when: allow_http_https | bool

- name: Allow extra ingress TCP ports
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_extra_tcp_ports | default([]) }}"
  when:
    - firewall_extra_tcp_ports is defined
    - firewall_extra_tcp_ports | length > 0

- name: Allow extra ingress UDP ports
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ firewall_extra_udp_ports | default([]) }}"
  when:
    - firewall_extra_udp_ports is defined
    - firewall_extra_udp_ports | length > 0
