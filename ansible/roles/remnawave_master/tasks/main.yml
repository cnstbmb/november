- name: Ensure remnawave external network exists
  ansible.builtin.command: docker network create {{ remnawave_network_name | default('remnawave-network') }}
  register: remnawave_master_network_create
  changed_when: remnawave_master_network_create.rc == 0
  failed_when:
    - remnawave_master_network_create.rc != 0
    - "'already exists' not in remnawave_master_network_create.stderr"
  when:
    - remnawave_master_create_network | default(true) | bool
    - not ansible_check_mode

- name: Ensure master bind directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ remnawave_master_required_dirs | default(['/srv/views', '/srv/dhparam', '/srv/configs', '/srv/pg-data', '/srv/logs', '/srv/postgres', '/srv/postgres/init']) }}"

- name: Resolve master nginx domains
  ansible.builtin.set_fact:
    remnawave_master_server_names_effective: >-
      {{
        remnawave_master_server_names
        if (remnawave_master_server_names is defined and remnawave_master_server_names is sequence and remnawave_master_server_names is not string)
        else (
          [remnawave_master_server_names]
          if (remnawave_master_server_names is defined and remnawave_master_server_names | length > 0)
          else (
            certbot_domains
            if (certbot_domains is defined and certbot_domains is sequence and certbot_domains is not string)
            else ([certbot_domains] if (certbot_domains is defined and certbot_domains | length > 0) else [inventory_hostname])
          )
        )
      }}

- name: Resolve master TLS domain
  ansible.builtin.set_fact:
    remnawave_master_tls_domain_effective: "{{ remnawave_master_tls_domain | default(remnawave_master_server_names_effective | first, true) }}"

- name: Ensure master TLS certificate exists
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ remnawave_master_tls_domain_effective }}/fullchain.pem"
  register: remnawave_master_fullchain_stat

- name: Ensure master TLS private key exists
  ansible.builtin.stat:
    path: "/etc/letsencrypt/live/{{ remnawave_master_tls_domain_effective }}/privkey.pem"
  register: remnawave_master_privkey_stat

- name: Validate master TLS files exist before starting compose
  ansible.builtin.assert:
    that:
      - remnawave_master_fullchain_stat.stat.exists
      - remnawave_master_privkey_stat.stat.exists
    fail_msg: >-
      TLS certificate files for {{ remnawave_master_tls_domain_effective }} are missing on master.
      Ensure certbot issued the certificate before remnawave_master starts the webserver container.

- name: Resolve remnawave database config paths
  ansible.builtin.set_fact:
    remnawave_master_database_json_src_effective: >-
      {{
        remnawave_master_database_json_src
        if (
          remnawave_master_database_json_src is defined and
          remnawave_master_database_json_src | regex_search('^/')
        )
        else (
          (repo_root ~ '/' ~ remnawave_master_database_json_src)
          if (
            remnawave_master_database_json_src is defined and
            remnawave_master_database_json_src | length > 0
          )
          else (repo_root ~ '/backend/configs/database.json')
        )
      }}
    remnawave_master_database_json_dest_effective: "{{ remnawave_master_database_json_dest | default('/srv/configs/database.json') }}"
    remnawave_master_database_json_mode_effective: "{{ remnawave_master_database_json_mode | default('0644') }}"
  when: remnawave_master_copy_database_json | default(true) | bool

- name: Resolve remnawave backend config directory paths
  ansible.builtin.set_fact:
    remnawave_master_configs_src_dir_effective: "{{ remnawave_master_database_json_src_effective | dirname }}"
    remnawave_master_configs_dest_dir_effective: "{{ remnawave_master_database_json_dest_effective | dirname }}"
    remnawave_master_bcrypt_config_src_effective: "{{ (remnawave_master_database_json_src_effective | dirname) ~ '/bcrypt.config.json' }}"
  when: remnawave_master_copy_database_json | default(true) | bool

- name: Ensure remnawave database config source is configured
  ansible.builtin.assert:
    that:
      - remnawave_master_database_json_src_effective | length > 0
    fail_msg: >-
      remnawave_master_database_json_src is empty. Set local path to database.json in
      group_vars/master.yml (or disable remnawave_master_copy_database_json explicitly).
  when: remnawave_master_copy_database_json | default(true) | bool

- name: Ensure remnawave database config exists on control node
  ansible.builtin.stat:
    path: "{{ remnawave_master_database_json_src_effective }}"
  register: remnawave_master_database_json_src_stat
  delegate_to: localhost
  become: false
  when: remnawave_master_copy_database_json | default(true) | bool

- name: Validate remnawave database config source file
  ansible.builtin.assert:
    that:
      - remnawave_master_database_json_src_stat.stat.exists
      - remnawave_master_database_json_src_stat.stat.isreg
    fail_msg: >-
      database.json source file not found on control node:
      {{ remnawave_master_database_json_src_effective }}
  when: remnawave_master_copy_database_json | default(true) | bool

- name: Ensure remnawave bcrypt config exists on control node
  ansible.builtin.stat:
    path: "{{ remnawave_master_bcrypt_config_src_effective }}"
  register: remnawave_master_bcrypt_config_src_stat
  delegate_to: localhost
  become: false
  when: remnawave_master_copy_database_json | default(true) | bool

- name: Validate remnawave bcrypt config source file
  ansible.builtin.assert:
    that:
      - remnawave_master_bcrypt_config_src_stat.stat.exists
      - remnawave_master_bcrypt_config_src_stat.stat.isreg
    fail_msg: >-
      bcrypt.config.json source file not found on control node:
      {{ remnawave_master_bcrypt_config_src_effective }}
  when: remnawave_master_copy_database_json | default(true) | bool

- name: Ensure destination directory for remnawave database config exists
  ansible.builtin.file:
    path: "{{ remnawave_master_configs_dest_dir_effective }}"
    state: directory
    mode: "0755"
  when: remnawave_master_copy_database_json | default(true) | bool

- name: Copy remnawave backend configs to master
  ansible.builtin.copy:
    src: "{{ remnawave_master_configs_src_dir_effective }}/"
    dest: "{{ remnawave_master_configs_dest_dir_effective }}/"
    mode: "{{ remnawave_master_database_json_mode_effective }}"
    directory_mode: "0755"
  when: remnawave_master_copy_database_json | default(true) | bool

- name: Ensure nginx config directory exists in compose path
  ansible.builtin.file:
    path: "{{ remnawave_master_nginx_conf_dest | default(compose_dest_dir ~ '/nginx-conf/') }}"
    state: directory
    mode: "0755"

- name: Render nginx config to master compose path
  ansible.builtin.template:
    src: "{{ remnawave_master_nginx_conf_template | default('nginx.conf.j2') }}"
    dest: "{{ remnawave_master_nginx_conf_file | default((remnawave_master_nginx_conf_dest | default(compose_dest_dir ~ '/nginx-conf/')) ~ '/nginx.conf') }}"
    mode: "0644"

- name: Copy postgres init scripts to master data path
  ansible.builtin.copy:
    src: "{{ remnawave_master_postgres_init_src | default(repo_root ~ '/deployments/prod/postgres/init/') }}"
    dest: "{{ remnawave_master_postgres_init_dest | default('/srv/postgres/init/') }}"
    mode: "0644"

- name: Deploy master compose stack
  ansible.builtin.import_role:
    name: docker_compose
