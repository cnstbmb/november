- name: Worker nodes setup
  hosts: workers
  become: true
  roles:
    - stubby
    - certbot
    - role: worker_landing
      when: enable_worker_landing | default(false) | bool
    - role: remnawave_node
      when: enable_remnawave_node | default(true) | bool
    - role: socks5_proxy
      when: enable_socks5_proxy | default(false) | bool
    - role: monitoring_agent
      when: enable_monitoring | bool
    - role: backups
      when: enable_backups | bool
