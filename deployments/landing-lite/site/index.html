<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Placeholder</title>
    <style>
      :root {
        --bg: #0b1220;
        --panel: #101a2d;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #22d3ee;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        color: var(--text);
        background: linear-gradient(160deg, #0f172a, #020617);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }
      .card {
        width: min(860px, 100%);
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(16, 26, 45, 0.92);
        border-radius: 14px;
        padding: 28px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(24px, 4vw, 36px);
      }
      p {
        margin: 0 0 10px;
        color: var(--muted);
      }
      .badge {
        display: inline-block;
        border-radius: 999px;
        border: 1px solid rgba(34, 211, 238, 0.5);
        color: var(--accent);
        padding: 4px 10px;
        font-size: 13px;
        margin-bottom: 14px;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <span class="badge">Landing Lite</span>
      <h1>Площадка для лендинга готова</h1>
      <p>Этот стек запускается на отдельной слабой машине.</p>
      <p>Master остается только для основного стека из `deployments/prod`.</p>
    </section>
  </body>
</html>
