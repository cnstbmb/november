- name: Install restic
  ansible.builtin.apt:
    name: restic
    state: present

- name: Ensure backup target is external
  ansible.builtin.assert:
    that:
      - backup_target is match(backup_external_target_regex)
    fail_msg: >-
      backup_target must point to external storage (for example s3:https://endpoint/bucket
      or /mnt/...).
      Current value: {{ backup_target }}
  when: backup_require_external_target | bool

- name: Ensure restic config directory exists
  ansible.builtin.file:
    path: /etc/restic
    state: directory
    mode: "0700"
  when: not ansible_check_mode

- name: Write restic credentials
  ansible.builtin.copy:
    dest: /etc/restic/credentials
    content: "{{ backup_password }}"
    mode: "0600"
  when: not ansible_check_mode

- name: Check restic repository
  ansible.builtin.command: restic snapshots
  register: restic_snapshots
  changed_when: false
  failed_when: false
  environment: >-
    {{
      {
        'RESTIC_REPOSITORY': backup_target,
        'RESTIC_PASSWORD_FILE': '/etc/restic/credentials'
      } | combine(backup_env | default({}))
    }}
  when: not ansible_check_mode

- name: Initialize restic repository
  ansible.builtin.command: restic init
  when:
    - not ansible_check_mode
    - restic_snapshots.rc != 0
  environment: >-
    {{
      {
        'RESTIC_REPOSITORY': backup_target,
        'RESTIC_PASSWORD_FILE': '/etc/restic/credentials'
      } | combine(backup_env | default({}))
    }}

- name: Install backup script
  ansible.builtin.template:
    src: restic-backup.sh.j2
    dest: /usr/local/bin/restic-backup.sh
    mode: "0750"
  when: not ansible_check_mode

- name: Schedule backup cron
  ansible.builtin.cron:
    name: "restic-backup"
    minute: "{{ backup_cron_minute }}"
    hour: "{{ backup_cron_hour }}"
    day: "{{ backup_cron_day }}"
    month: "{{ backup_cron_month }}"
    weekday: "{{ backup_cron_weekday }}"
    job: "/usr/local/bin/restic-backup.sh"
  when: not ansible_check_mode
