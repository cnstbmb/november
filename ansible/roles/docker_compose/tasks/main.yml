- name: Resolve local compose paths on control-node
  ansible.builtin.set_fact:
    compose_src_effective: >-
      {{
        compose_src
        if (compose_src is defined and compose_src | regex_search('^/'))
        else ((repo_root ~ '/' ~ compose_src) if (compose_src is defined and compose_src | length > 0) else '')
      }}
    env_src_effective: >-
      {{
        env_src
        if (env_src is defined and env_src | regex_search('^/'))
        else ((repo_root ~ '/' ~ env_src) if (env_src is defined and env_src | length > 0) else '')
      }}

- name: Ensure compose destination directory exists
  ansible.builtin.file:
    path: "{{ compose_dest_dir }}"
    state: directory
    mode: "0755"

- name: Copy docker-compose file
  ansible.builtin.copy:
    src: "{{ compose_src_effective }}"
    dest: "{{ compose_dest_file }}"
    mode: "0644"

- name: Copy env file if provided
  ansible.builtin.copy:
    src: "{{ env_src_effective }}"
    dest: "{{ env_dest }}"
    mode: "0600"
  when: env_src is defined and env_src | length > 0

- name: Ensure empty env file exists when env_src is not provided
  ansible.builtin.copy:
    dest: "{{ env_dest }}"
    content: ""
    mode: "0600"
    force: false
  when:
    - env_dest is defined
    - env_dest | length > 0
    - env_src is not defined or env_src | length == 0
    - not ansible_check_mode

- name: Run docker compose up
  ansible.builtin.command: >
    docker compose -f {{ compose_dest_file }}
    {% if compose_project_name is defined and compose_project_name | length > 0 %}
    --project-name {{ compose_project_name }}
    {% endif %}
    up -d
  args:
    chdir: "{{ compose_dest_dir }}"
  when: not ansible_check_mode
