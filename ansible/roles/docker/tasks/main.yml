- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-plugin
    state: present
  when: install_docker | bool

- name: Ensure Docker service is enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  when: install_docker | bool

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users | default([]) }}"
  when: install_docker | bool

- name: Ensure docker config directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"
  when:
    - install_docker | bool
    - docker_configure_log_rotation | bool

- name: Configure docker daemon log rotation
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"
  register: docker_daemon_config
  when:
    - install_docker | bool
    - docker_configure_log_rotation | bool

- name: Restart docker to apply daemon settings
  ansible.builtin.service:
    name: docker
    state: restarted
  when:
    - install_docker | bool
    - docker_configure_log_rotation | bool
    - docker_daemon_config is changed
