- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set default UFW policies
  ansible.builtin.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow outgoing by default
  ansible.builtin.ufw:
    state: enabled
    policy: allow
    direction: outgoing

- name: Allow SSH
  ansible.builtin.ufw:
    rule: allow
    port: "{{ ansible_port }}"
    proto: tcp

- name: Allow configured ingress TCP ports
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: >-
    {{
      (
        firewall_master_tcp_ports | default([80, 443, 9443, 10443])
      )
      +
      (
        [monitoring_grafana_port]
        if (enable_monitoring | default(false) | bool)
        else []
      )
      | map('int')
      | unique
      | list
    }}
  when: allow_http_https | bool

- name: Allow extra ingress TCP ports
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_extra_tcp_ports | default([]) }}"
  when:
    - firewall_extra_tcp_ports is defined
    - firewall_extra_tcp_ports | length > 0

- name: Allow extra ingress UDP ports
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  loop: "{{ firewall_extra_udp_ports | default([]) }}"
  when:
    - firewall_extra_udp_ports is defined
    - firewall_extra_udp_ports | length > 0

- name: Allow Prometheus scrapes from master to worker node exporters
  ansible.builtin.ufw:
    rule: allow
    port: "{{ monitoring_node_exporter_port | default(9100) | string }}"
    proto: tcp
    from_ip: "{{ hostvars[item].ansible_host | default(item) }}"
  loop: "{{ groups['master'] | default([]) }}"
  when:
    - enable_monitoring | default(false) | bool
    - inventory_hostname not in (groups['master'] | default([]))

- name: Allow Promtail on workers to push logs into master Loki
  ansible.builtin.ufw:
    rule: allow
    port: "{{ monitoring_loki_port | default(3100) | string }}"
    proto: tcp
    from_ip: "{{ hostvars[item].ansible_host | default(item) }}"
  loop: "{{ groups['workers'] | default([]) }}"
  when:
    - enable_monitoring | default(false) | bool
    - inventory_hostname in (groups['master'] | default([]))
