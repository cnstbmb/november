allow_http_https: true
firewall_master_tcp_ports:
  - 80
  - 443
enable_nginx: false # set true only if nginx runs on host, not in compose
enable_certbot: true # enable cert issuance on master via certbot role
enable_monitoring: true
enable_backups: true
enable_adguard: true # deploy AdGuard Home on master
enable_remnawave_panel: false # deploy Remnawave panel on master via docker compose
enable_remnashop: false # deploy remnashop bot/shop on master (disabled by default)
remnashop_dir: "/opt/remnashop"
remnashop_mode: "internal" # internal uses remnawave network, external publishes ports
remnashop_validate_env: true # fail if .env contains placeholders like change_me
# remnashop_env_src: "########" # local private path on controller, e.g. /Users/you/november/.private/ansible/prod/remnashop/.env
# remnashop_env_dest: "/opt/remnashop/.env"
monitoring_prometheus_retention: "7d"
monitoring_loki_retention: "168h"
backup_target: "/mnt/backup/november" # mount external disk or use remote target like s3://bucket/path

# Optional AdGuard overrides:
# adguard_dir: "/opt/adguardhome"
# adguard_web_port: 3000
# adguard_dns_port: 53
# adguard_timezone: "UTC"
# adguard_manage_config: true
# adguard_users: # keep in .private, not in git
#   - name: "admin"
#     password: "$2a$10$..."
# adguard_tls_enabled: true
# adguard_tls_server_name: "dns.example.com"
# adguard_tls_port_dns_over_tls: 953
# adguard_tls_certificate_path: "/etc/letsencrypt/live/dns.example.com/fullchain.pem"
# adguard_tls_private_key_path: "/etc/letsencrypt/live/dns.example.com/privkey.pem"

# Optional Remnawave panel on separate domain (for example panel.example.com).
# remnawave_panel_domain: "panel.example.com"
# remnawave_panel_dir: "/opt/remnawave-panel"
# remnawave_panel_project_name: "remnawave-panel"
# remnawave_panel_postgres_user: "remnawave"
# remnawave_panel_postgres_password: "########"
# remnawave_panel_postgres_db: "remnawave"
# remnawave_panel_jwt_auth_secret: "########"
# remnawave_panel_jwt_api_tokens_secret: "########"
# remnawave_panel_metrics_user: "admin"
# remnawave_panel_metrics_pass: "########"
# remnawave_panel_webhook_secret: "64-char-secret"

# Optional remnawave-node on master (for example if master should also be a transit/egress node).
# Host-specific secrets are best stored in .private/ansible/prod/host_vars/<master>/remnawave_node.yml.
# enable_remnawave_node: false
# node_compose_src: "deployments/prod/remnawave-node/docker-compose.yml"
# node_compose_dest_dir: "/opt/remnawave-node"
# node_compose_dest_file: "/opt/remnawave-node/docker-compose.yml"
# node_env_src: ""
# node_env_dest: "/opt/remnawave-node/.env"
# remnawave_node_open_firewall: true
# node_firewall_port: 2222
