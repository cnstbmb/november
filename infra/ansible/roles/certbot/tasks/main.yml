- name: Install certbot packages
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-dns-cloudflare
    state: present
  when: certbot_install | default(true) | bool

- name: Resolve certbot reload containers
  ansible.builtin.set_fact:
    certbot_reload_containers_effective: >-
      {{
        certbot_reload_containers
        if (certbot_reload_containers is defined)
        else (
          (
            [remnawave_panel_proxy_container_name]
            if (
              'master' in group_names and
              (enable_remnawave_panel | default(false) | bool) and
              (remnawave_panel_proxy_container_name is defined and remnawave_panel_proxy_container_name | length > 0)
            )
            else (
              ['remnawave-panel-proxy']
              if (
                'master' in group_names and
                (enable_remnawave_panel | default(false) | bool)
              )
              else []
            )
          )
        )
      }}
  when: certbot_install | default(true) | bool

- name: Ensure certbot timer is enabled
  ansible.builtin.systemd_service:
    name: certbot.timer
    enabled: true
    state: started
  when: certbot_install | default(true) | bool

- name: Resolve certbot domains
  ansible.builtin.set_fact:
    certbot_domains_effective: >-
      {{
        certbot_domains
        if (certbot_domains is defined and certbot_domains is sequence and certbot_domains is not string)
        else ([certbot_domains] if (certbot_domains is defined and certbot_domains | length > 0) else [inventory_hostname])
      }}
  when: enable_certbot | default(false) | bool

- name: Validate certbot settings
  ansible.builtin.assert:
    that:
      - letsencrypt_email | default('') | length > 0
      - cloudflare_api_token | default('') | length > 0
      - certbot_domains_effective | length > 0
    fail_msg: >-
      Certbot is enabled, but required vars are missing for {{ inventory_hostname }}.
      Required: letsencrypt_email, cloudflare_api_token, certbot_domains.
  when: enable_certbot | default(false) | bool

- name: Create certbot credentials file
  ansible.builtin.template:
    src: cloudflare.ini.j2
    dest: "{{ certbot_credentials_path }}"
    mode: "0600"
  when: enable_certbot | default(false) | bool

- name: Ensure certbot deploy hook directory exists
  ansible.builtin.file:
    path: /etc/letsencrypt/renewal-hooks/deploy
    state: directory
    mode: "0755"
  when: enable_certbot | default(false) | bool

- name: Install certbot deploy hook to reload containers
  ansible.builtin.template:
    src: reload-containers.sh.j2
    dest: /etc/letsencrypt/renewal-hooks/deploy/reload-containers.sh
    mode: "0755"
  when: enable_certbot | default(false) | bool

- name: Obtain certificate via DNS-01
  ansible.builtin.command: >
    certbot certonly --dns-cloudflare
    --dns-cloudflare-credentials {{ certbot_credentials_path }}
    --dns-cloudflare-propagation-seconds {{ certbot_dns_propagation_seconds | default(60) }}
    --cert-name {{ certbot_domains_effective | first }}
    --expand
    --non-interactive --agree-tos --keep-until-expiring
    -m {{ letsencrypt_email }}
    {% for domain in certbot_domains_effective %}
    -d {{ domain }}
    {% endfor %}
  when:
    - enable_certbot | default(false) | bool
    - not ansible_check_mode
